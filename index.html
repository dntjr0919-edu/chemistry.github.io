<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>화학 체험 문제 카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root{
  --bg:#f5f7f6;--srf:#fff;--srf2:#ecf1ef;--bdr:rgba(0,0,0,.10);
  --txt:#182421;--mut:#4d6b62;--fnt:#9bbab3;
  --pri:#0d7a5f;--pri-h:#0a5f49;--pri-l:#d8eeea;
  --acc:#e8a020;--acc-l:#fff3da;
  --ok:#2e7d32;--ok-l:#e8f5e9;--err:#c62828;--err-l:#ffebee;
  --ff:'Noto Sans KR',sans-serif;
  --s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;--s10:2.5rem;--s12:3rem;
  --r-sm:.375rem;--r-md:.625rem;--r-lg:1rem;--r-xl:1.25rem;--r-f:9999px;
  --sh:0 2px 12px rgba(0,0,0,.08);--sh2:0 6px 24px rgba(0,0,0,.12);
  --tx-xs:clamp(.75rem,.7rem + .2vw,.85rem);
  --tx-s:clamp(.875rem,.82rem + .3vw,.975rem);
  --tx-b:clamp(1rem,.95rem + .2vw,1.1rem);
  --tx-l:clamp(1.1rem,1rem + .6vw,1.4rem);
  --tx-xl:clamp(1.4rem,1.1rem + 1vw,1.85rem);
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:none;text-size-adjust:none}
body{font-family:var(--ff);font-size:var(--tx-b);color:var(--txt);background:var(--bg);min-height:100dvh;line-height:1.6}

/* ── Layout ── */
.app{max-width:520px;margin:0 auto;padding:var(--s4);min-height:100dvh;display:flex;flex-direction:column}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:var(--s3) 0 var(--s5)}
.logo{display:flex;align-items:center;gap:var(--s2);font-weight:900;font-size:var(--tx-l);color:var(--pri)}
.logo svg{flex-shrink:0}
.progress-wrap{flex:1;margin:0 var(--s4);display:flex;flex-direction:column;gap:var(--s1)}
.progress-bar{height:6px;background:var(--srf2);border-radius:var(--r-f);overflow:hidden}
.progress-fill{height:100%;background:var(--pri);border-radius:var(--r-f);transition:width .4s var(--ease)}
.progress-label{font-size:var(--tx-xs);color:var(--mut);text-align:right}

/* ── Card ── */
.card{background:var(--srf);border-radius:var(--r-xl);padding:var(--s6);box-shadow:var(--sh);border:1px solid var(--bdr);margin-bottom:var(--s4);flex:1;display:flex;flex-direction:column}
.set-badge{display:inline-flex;align-items:center;gap:var(--s1);background:var(--pri-l);color:var(--pri);font-size:var(--tx-xs);font-weight:700;padding:var(--s1) var(--s3);border-radius:var(--r-f);margin-bottom:var(--s4);letter-spacing:.04em}
.q-num{font-size:var(--tx-xs);color:var(--mut);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:var(--s2)}
.q-text{font-size:var(--tx-l);font-weight:700;line-height:1.45;color:var(--txt);margin-bottom:var(--s6);flex-shrink:0}
.q-text sub,sup{font-size:.72em}

/* ── Options ── */
.options{display:flex;flex-direction:column;gap:var(--s3);flex:1}
.opt{display:flex;align-items:center;gap:var(--s3);padding:var(--s4);background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r-lg);cursor:pointer;transition:background .18s var(--ease),border-color .18s var(--ease),box-shadow .18s var(--ease);-webkit-tap-highlight-color:transparent;text-align:left;width:100%}
.opt:hover{background:var(--pri-l);border-color:var(--pri);box-shadow:var(--sh)}
.opt:active{transform:scale(.98)}
.opt-num{width:30px;height:30px;border-radius:50%;background:var(--srf);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:var(--tx-xs);font-weight:900;flex-shrink:0;transition:background .18s,border-color .18s,color .18s}
.opt-txt{font-size:var(--tx-s);font-weight:500;line-height:1.4;color:var(--txt)}
/* states */
.opt.selected{background:var(--pri-l);border-color:var(--pri)}
.opt.selected .opt-num{background:var(--pri);border-color:var(--pri);color:#fff}
.opt.correct{background:var(--ok-l);border-color:var(--ok);cursor:default}
.opt.correct .opt-num{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.wrong{background:var(--err-l);border-color:var(--err);cursor:default}
.opt.wrong .opt-num{background:var(--err);border-color:var(--err);color:#fff}
.opt.disabled{cursor:default;opacity:.55}
.opt.reveal-correct{background:var(--ok-l);border-color:var(--ok)}
.opt.reveal-correct .opt-num{background:var(--ok);border-color:var(--ok);color:#fff}

/* ── Feedback ── */
.feedback{margin-top:var(--s4);padding:var(--s4);border-radius:var(--r-lg);font-size:var(--tx-s);line-height:1.6;display:none;animation:fadeUp .3s var(--ease) both}
.feedback.show{display:block}
.feedback.ok{background:var(--ok-l);border:1px solid var(--ok);color:var(--ok)}
.feedback.ng{background:var(--err-l);border:1px solid var(--err);color:var(--err)}
.feedback strong{display:block;font-size:var(--tx-b);margin-bottom:var(--s1)}

/* ── Next btn ── */
.btn-next{display:none;margin-top:var(--s4);width:100%;padding:var(--s4);background:var(--pri);color:#fff;border:none;border-radius:var(--r-lg);font-family:var(--ff);font-size:var(--tx-b);font-weight:700;cursor:pointer;transition:background .18s var(--ease);animation:fadeUp .3s var(--ease) both}
.btn-next.show{display:block}
.btn-next:hover{background:var(--pri-h)}
.btn-next:active{transform:scale(.98)}

/* ── Result ── */
#result{display:none;flex-direction:column;align-items:center;text-align:center;padding:var(--s8) var(--s4);animation:fadeUp .4s var(--ease) both}
#result.show{display:flex}
.result-circle{position:relative;width:120px;height:120px;margin-bottom:var(--s6)}
.result-circle svg{transform:rotate(-90deg)}
.result-circle .score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;line-height:1.1}
.result-circle .score-num{font-size:2rem;color:var(--pri)}
.result-circle .score-tot{font-size:var(--tx-xs);color:var(--mut)}
.result-grade{font-size:var(--tx-xl);font-weight:900;margin-bottom:var(--s2)}
.result-msg{font-size:var(--tx-s);color:var(--mut);margin-bottom:var(--s8);max-width:34ch}
.result-breakdown{width:100%;background:var(--srf);border-radius:var(--r-xl);padding:var(--s5);box-shadow:var(--sh);border:1px solid var(--bdr);margin-bottom:var(--s6);text-align:left}
.breakdown-title{font-size:var(--tx-xs);color:var(--mut);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:var(--s3)}
.breakdown-item{display:flex;align-items:center;gap:var(--s3);padding:var(--s2) 0;border-bottom:1px solid var(--bdr)}
.breakdown-item:last-child{border-bottom:none}
.breakdown-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.breakdown-dot.ok{background:var(--ok)}
.breakdown-dot.ng{background:var(--err)}
.breakdown-q{font-size:var(--tx-xs);color:var(--txt);flex:1;line-height:1.4}
.breakdown-ans{font-size:var(--tx-xs);color:var(--mut);white-space:nowrap}
.btn-retry{padding:var(--s4) var(--s8);background:var(--pri);color:#fff;border:none;border-radius:var(--r-lg);font-family:var(--ff);font-size:var(--tx-b);font-weight:700;cursor:pointer;transition:background .18s var(--ease)}
.btn-retry:hover{background:var(--pri-h)}

/* ── Landing / Error ── */
#landing,#error-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--s8) var(--s4)}
#landing .hero-icon,#error-page .hero-icon{font-size:3.5rem;margin-bottom:var(--s5)}
#landing h1,#error-page h1{font-size:var(--tx-xl);font-weight:900;margin-bottom:var(--s3);color:var(--txt)}
#landing p,#error-page p{font-size:var(--tx-s);color:var(--mut);max-width:34ch;line-height:1.6}

/* ── Confetti ── */
.confetti-piece{position:fixed;top:-10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:999}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .35s var(--ease) both}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <svg aria-label="화학 로고" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/>
        <circle cx="14" cy="8"  r="2.5" fill="currentColor"/>
        <circle cx="8"  cy="19" r="2.5" fill="currentColor"/>
        <circle cx="20" cy="19" r="2.5" fill="currentColor"/>
        <line x1="14" y1="8" x2="8"  y2="19" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="8" x2="20" y2="19" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8"  y1="19" x2="20" y2="19" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      화학
    </div>
    <div class="progress-wrap" id="prog-wrap" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="progress-label" id="prog-label"></div>
    </div>
  </header>

  <main id="main-area">
    <div id="landing">
      <div class="hero-icon">📱</div>
      <h1>QR 코드를 스캔하세요</h1>
      <p>교사가 제공한 문제 카드의 QR 코드를 스캔하면 문제가 바로 시작됩니다.</p>
    </div>
  </main>
</div>

<script>
const SETS = {
  1: {
    title: "화학의 언어 — 몰(mol)",
    qs: [
      { q:"탄소(C) 원자 1몰의 질량은 얼마인가?", opts:["6 g","12 g","24 g","44 g","48 g"], ans:1, exp:"탄소의 원자량은 12이므로 1몰의 질량은 12 g입니다." },
      { q:"아보가드로 수(N_A)의 값으로 가장 가까운 것은?", opts:["6.02×10²²","6.02×10²³","6.02×10²⁴","3.01×10²³","1.20×10²³"], ans:1, exp:"아보가드로 수는 약 6.02×10²³ /mol입니다." },
      { q:"H₂O 18 g에 포함된 물 분자의 수는?", opts:["3.01×10²³개","6.02×10²³개","1.20×10²⁴개","1.80×10²³개","9.03×10²³개"], ans:1, exp:"H₂O의 분자량=18 g/mol이므로 18 g=1몰 → 6.02×10²³개" },
      { q:"기체 1몰이 0 °C, 1 atm에서 차지하는 부피(표준 몰부피)는?", opts:["11.2 L","22.4 L","33.6 L","44.8 L","4.00 L"], ans:1, exp:"0 °C, 1 atm에서 이상 기체 1몰의 부피는 22.4 L입니다." },
      { q:"NaCl(식염) 58.5 g에 들어 있는 Na⁺ 이온의 몰수는? (Na=23, Cl=35.5)", opts:["0.5 mol","1 mol","2 mol","1.5 mol","0.25 mol"], ans:1, exp:"NaCl의 화학식량=58.5 g/mol → 1몰 → Na⁺ 1몰" }
    ]
  },
  2: {
    title: "물질의 구조 — 화학 결합",
    qs: [
      { q:"전기음성도 차이가 가장 큰 결합은?", opts:["C-H","N-H","O-H","F-H","Cl-H"], ans:3, exp:"F의 전기음성도(4.0)가 가장 크고, H(2.1)와의 차이(1.9)가 가장 큽니다." },
      { q:"루이스 전자점식에서 CO₂의 공유 전자쌍 수는?", opts:["1","2","3","4","5"], ans:3, exp:"CO₂: O=C=O → 이중결합 2개 = 공유 전자쌍 4개" },
      { q:"다음 중 극성 공유 결합이 아닌 것은?", opts:["HCl","H₂O","NH₃","O₂","HF"], ans:3, exp:"O₂는 같은 원소 사이의 결합 → 전기음성도 차이=0 → 무극성 공유 결합" },
      { q:"물(H₂O) 분자의 결합각으로 가장 가까운 값은?", opts:["90°","104.5°","109.5°","120°","180°"], ans:1, exp:"물 분자는 굽은형 구조로 결합각이 약 104.5°입니다." },
      { q:"이온 결합의 특성으로 옳은 것은?", opts:["녹는점이 낮다","고체 상태에서 전기 전도성이 크다","비금속-비금속 사이에서 형성된다","수용액에서 전기를 전도한다","모두 무극성이다"], ans:3, exp:"이온 결합 물질은 수용액(또는 용융액) 상태에서 이온이 자유롭게 이동하므로 전기를 전도합니다." }
    ]
  },
  3: {
    title: "화학 평형",
    qs: [
      { q:"다음 중 동적 평형 상태에 대한 설명으로 옳은 것은?", opts:["반응이 완전히 멈춘 상태","정반응 속도=역반응 속도","반응물 농도=생성물 농도","평형 상수 K=0","온도에 무관하다"], ans:1, exp:"동적 평형은 반응이 멈춘 것이 아니라 정반응 속도와 역반응 속도가 같아진 상태입니다." },
      { q:"N₂(g)+3H₂(g) ⇌ 2NH₃(g) 에서 압력을 높이면 평형이 이동하는 방향은?", opts:["N₂와 H₂가 생성되는 방향","NH₃가 생성되는 방향","변화 없음","온도에 따라 다름","부피가 증가하는 방향"], ans:1, exp:"압력을 높이면 기체 몰수가 적은 방향(NH₃ 생성, 4몰→2몰)으로 평형이 이동합니다." },
      { q:"평형 상수(K)가 1보다 매우 크다는 것이 의미하는 것은?", opts:["반응물이 더 많이 존재","생성물이 더 많이 존재","반응 속도가 빠름","반응이 가역적이지 않음","온도가 높음"], ans:1, exp:"K≫1이면 분자(생성물 농도)가 분모(반응물 농도)보다 훨씬 크다 → 생성물이 우세." },
      { q:"르샤틀리에 원리에 따르면 발열 반응의 평형에서 온도를 올리면?", opts:["정반응 촉진","역반응 촉진","변화 없음","K값이 증가","압력이 감소"], ans:1, exp:"온도 상승 → 열을 흡수하는 역반응 방향으로 평형 이동 → 역반응 촉진." },
      { q:"평형에서 촉매를 첨가하면 나타나는 결과로 옳은 것은?", opts:["K값이 커진다","정반응만 빨라진다","평형 농도가 변한다","평형에 도달하는 시간이 짧아진다","생성물 농도가 증가한다"], ans:3, exp:"촉매는 정반응·역반응 속도를 동일하게 높여 평형에 더 빨리 도달하게 하지만, K값과 평형 농도는 변하지 않습니다." }
    ]
  },
  4: {
    title: "역동적인 화학 반응 — pH",
    qs: [
      { q:"25 °C에서 순수한 물의 [H⁺] 농도는?", opts:["1×10⁻⁷ mol/L","1×10⁻¹⁴ mol/L","1×10⁻⁷ g/L","7 mol/L","1 mol/L"], ans:0, exp:"25 °C에서 물의 이온곱 Kw=1×10⁻¹⁴이고 [H⁺]=[OH⁻]=1×10⁻⁷ mol/L입니다." },
      { q:"pH=3인 용액의 [H⁺] 농도는?", opts:["3×10⁻¹ mol/L","1×10⁻³ mol/L","1×10⁻¹¹ mol/L","3×10⁻³ mol/L","1×10⁻⁷ mol/L"], ans:1, exp:"pH=3이면 [H⁺]=10⁻³=1×10⁻³ mol/L입니다." },
      { q:"HCl 0.1 mol/L 수용액의 pH는? (HCl은 강산으로 완전 이온화 가정)", opts:["1","7","13","0.1","2"], ans:0, exp:"[H⁺]=0.1=10⁻¹ mol/L → pH=1" },
      { q:"중화 반응에서 산과 염기가 반응하면 생성되는 것은?", opts:["산화물","염과 물","기체와 산","수소와 산소","이온과 전자"], ans:1, exp:"산+염기 → 염+물 (중화 반응의 기본 공식입니다.)" },
      { q:"pH=11인 NaOH 수용액의 [OH⁻] 농도는? (25 °C)", opts:["1×10⁻¹¹ mol/L","1×10⁻³ mol/L","1×10⁻¹ mol/L","11 mol/L","1×10⁻⁷ mol/L"], ans:1, exp:"pH=11 → [H⁺]=10⁻¹¹ → [OH⁻]=Kw/[H⁺]=10⁻¹⁴/10⁻¹¹=10⁻³=1×10⁻³ mol/L" }
    ]
  }
};

const GRADES=[
  {min:5,label:"🏆 완벽!",msg:"모든 문제를 맞혔어요! 화학 실력이 탁월합니다."},
  {min:4,label:"🌟 훌륭해요!",msg:"거의 다 맞혔어요. 조금만 더 복습하면 완벽해요!"},
  {min:3,label:"👍 잘 했어요!",msg:"절반 이상 맞혔어요. 틀린 부분을 다시 확인해 보세요."},
  {min:2,label:"📖 다시 도전!",msg:"개념을 한 번 더 읽고 다시 풀어보세요."},
  {min:0,label:"💪 화이팅!",msg:"어렵지 않아요. 교과서를 참고하면서 다시 시작해 봐요."}
];

let setId, set, cur=0, score=0, answered=[], selectedOpt=-1, hasAnswered=false;

function init(){
  const hash=location.hash.replace('#','');
  const n=parseInt(hash);
  if(!hash||!SETS[n]){showLanding();return;}
  setId=n; set=SETS[n];
  answered=new Array(set.qs.length).fill(null);
  showQuiz();
}

function showLanding(){document.getElementById('landing').style.display='flex';}

function showQuiz(){
  document.getElementById('landing').style.display='none';
  document.getElementById('prog-wrap').style.display='flex';
  renderQ();
}

function renderQ(){
  const area=document.getElementById('main-area');
  const q=set.qs[cur];
  updateProgress();
  area.innerHTML=`
  <div class="card" role="main">
    <div class="set-badge">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="4" r="1.2" fill="currentColor"/><line x1="4" y1="7" x2="6" y2="7" stroke="currentColor" stroke-width="1.2"/><line x1="6" y1="7" x2="8" y2="7" stroke="currentColor" stroke-width="1.2"/></svg>
      단원 ${setId} · ${set.title}
    </div>
    <div class="q-num">문제 ${cur+1} / ${set.qs.length}</div>
    <p class="q-text">${q.q}</p>
    <div class="options" id="opts">
      ${q.opts.map((o,i)=>`
      <button class="opt" data-i="${i}" onclick="select(${i})" aria-label="선택지 ${i+1}: ${o}">
        <span class="opt-num">${i+1}</span>
        <span class="opt-txt">${o}</span>
      </button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="btn-next" id="btn-next" onclick="next()">
      ${cur+1<set.qs.length?'다음 문제 →':'결과 보기 →'}
    </button>
  </div>`;
  selectedOpt=-1; hasAnswered=false;
}

function select(i){
  if(hasAnswered)return;
  selectedOpt=i; hasAnswered=true;
  const q=set.qs[cur];
  const opts=document.querySelectorAll('.opt');
  const fb=document.getElementById('fb');
  const btn=document.getElementById('btn-next');
  const correct=i===q.ans;
  if(correct)score++;
  answered[cur]=i;
  opts.forEach((o,idx)=>{
    o.setAttribute('onclick','');
    if(idx===i)o.classList.add(correct?'correct':'wrong');
    else if(idx===q.ans)o.classList.add('reveal-correct');
    else o.classList.add('disabled');
  });
  fb.className='feedback show '+(correct?'ok':'ng');
  fb.innerHTML=correct
    ?`<strong>✓ 정답!</strong>${q.exp}`
    :`<strong>✗ 오답</strong>${q.exp}`;
  btn.className='btn-next show';
}

function next(){
  cur++;
  if(cur>=set.qs.length){showResult();}
  else{renderQ();}
}

function updateProgress(){
  document.getElementById('prog-fill').style.width=`${(cur/set.qs.length)*100}%`;
  document.getElementById('prog-label').textContent=`${cur}/${set.qs.length}`;
}

function showResult(){
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-label').textContent=`${set.qs.length}/${set.qs.length}`;
  const total=set.qs.length;
  const pct=Math.round(score/total*100);
  const grade=GRADES.find(g=>score>=g.min);
  const r=34; const circ=2*Math.PI*r; const off=circ-(pct/100)*circ;
  const area=document.getElementById('main-area');
  const breakdownHtml=set.qs.map((q,i)=>{
    const ok=answered[i]===q.ans;
    return`<div class="breakdown-item">
      <span class="breakdown-dot ${ok?'ok':'ng'}"></span>
      <span class="breakdown-q">${q.q.length>36?q.q.slice(0,36)+'…':q.q}</span>
      <span class="breakdown-ans">${ok?'✓':'✗ 정답: '+(q.ans+1)+'번'}</span>
    </div>`;
  }).join('');
  area.innerHTML=`<div id="result" class="show">
    <div class="result-circle">
      <svg width="120" height="120" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="#e0eeec" stroke-width="7"/>
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="${pct>=80?'#0d7a5f':pct>=60?'#e8a020':'#c62828'}" stroke-width="7"
          stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/>
      </svg>
      <div class="score-text">
        <span class="score-num">${score}</span>
        <span class="score-tot">/ ${total}</span>
      </div>
    </div>
    <div class="result-grade">${grade.label}</div>
    <p class="result-msg">${grade.msg}</p>
    <div class="result-breakdown">
      <div class="breakdown-title">문제별 결과</div>
      ${breakdownHtml}
    </div>
    <button class="btn-retry" onclick="retry()">다시 풀기</button>
  </div>`;
  if(score===total)confetti();
}

function retry(){cur=0;score=0;answered=new Array(set.qs.length).fill(null);renderQ();}

function confetti(){
  const colors=['#0d7a5f','#e8a020','#2e7d32','#1565c0','#ad1457'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[i%colors.length]};animation-duration:${1.2+Math.random()*1.8}s;animation-delay:${Math.random()*.5}s`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

window.addEventListener('hashchange',()=>{cur=0;score=0;init();});
init();
</script>
</body>
</html>
